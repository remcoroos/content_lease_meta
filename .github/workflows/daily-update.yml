name: Daily Feed Update

on:
  schedule:
    - cron: '0 4 * * *' # Runs every day at 4:00 AM UTC
  workflow_dispatch:
    # Allows manual triggering from Vercel

permissions:
  contents: write

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run feed processor
        run: node index.js
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          FEED_URL: ${{ vars.FEED_URL }}
          MAX_ITEMS: ${{ vars.MAX_ITEMS }}
          BG_REMOVAL: ${{ vars.BG_REMOVAL }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/meta-product-feed.xml public/last_updated.txt

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update meta feed via GitHub Actions"

          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "Successfully pushed on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done

          echo "Failed to push after 3 attempts"
          exit 1

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Feed generation failed',
              body: `Workflow run failed: [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })
