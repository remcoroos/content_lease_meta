<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Lease | Feed Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f2f7; /* Lichtpaarse achtergrond uit text file */
            --card-bg: #ffffff;
            --text-main: #1c0a30; /* Donkerpaars */
            --text-muted: #776d83; /* Grijspaars */
            --border-color: #e8e2e2;
            --accent: #6d3ef3; /* Paars */
            --accent-green: #2fb25d; /* Groen */
            --accent-yellow: #f4be04; /* Geel */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .monitor-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(109, 62, 243, 0.08);
        }
        .header {
            margin-bottom: 30px;
        }
        .eyebrow {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 8px;
            font-weight: 700;
        }
        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            margin-top: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            background: #f4f2f7;
            padding: 6px 12px;
            border-radius: 20px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #cdcdcd; 
            border-radius: 50%;
            margin-right: 8px;
        }
        .dot.active {
            background: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(47, 178, 93, 0.2);
        }
        .dot.error {
            background: #f87171;
            box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.2);
        }
        .dot.processing {
            background: var(--accent-yellow);
            box-shadow: 0 0 0 3px rgba(244, 190, 4, 0.2);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .url-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 25px;
            background: #f9f9fb;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .url-box label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }
        .url-input-group {
            display: flex;
            gap: 8px;
        }
        .url-input-group input {
            flex-grow: 1;
            padding: 12px 14px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            background: #ffffff;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .url-input-group input:focus {
            border-color: var(--accent);
        }
        .btn-save {
            background: var(--text-main);
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-save:hover {
            opacity: 0.85;
        }

        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .data-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .data-label {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .data-value {
            font-size: 15px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
            gap: 8px;
        }
        .button:hover {
            background: #5b30d6;
            transform: translateY(-1px);
        }
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #ffffff;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-secondary:hover {
            background: #fcfaff;
            transform: translateY(-1px);
        }
        .footer {
            margin-top: 35px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            background: #f4f2f7;
            padding: 16px;
            border-radius: 12px;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-green);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(47, 178, 93, 0.3);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="toast" id="toast">Opgeslagen!</div>

<div class="monitor-wrapper">
    <div class="header">
        <div class="eyebrow">Content Lease</div>
        <h1>Meta Feed Dashboard</h1>
        <div class="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Verbinden met server...</span>
        </div>
    </div>

    <div class="url-box">
        <label for="feed-url">Bron URL (XML Feed)</label>
        <div class="url-input-group">
            <input type="text" id="feed-url" placeholder="https://...">
            <button class="btn-save" onclick="saveUrl()" id="save-btn">Opslaan</button>
        </div>
    </div>

    <div class="data-grid">
        <div class="data-item">
            <span class="data-label">Laatste Synchronisatie</span>
            <span class="data-value" id="last-sync">...</span>
        </div>
        <div class="data-item">
            <span class="data-label">Gevalideerde Voertuigen</span>
            <span class="data-value" id="vehicle-count">...</span>
        </div>
    </div>

    <div class="actions">
        <button class="button" onclick="forceUpdate()" id="update-btn">
            <span>🔄</span> Nu Synchroniseren & Genereren
        </button>
        <a href="/meta-product-feed.xml" class="button btn-secondary" target="_blank">
            <span>📄</span> Bekijk Gegenereerde XML
        </a>
    </div>

    <div class="footer">
        Powered door Cloudinary Meta Optimalisatie.<br>
        Vormgeving: Content Lease styling (Paars / Groen).
    </div>
</div>

<script>
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function saveUrl() {
        const input = document.getElementById('feed-url');
        const btn = document.getElementById('save-btn');
        btn.textContent = '...';
        
        try {
            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ feedUrl: input.value })
            });
            if (res.ok) {
                showToast('Bron URL succesvol opgeslagen!');
            } else {
                throw new Error('Fout bij opslaan');
            }
        } catch (e) {
            alert(e.message);
        } finally {
            btn.textContent = 'Opslaan';
        }
    }

    async function forceUpdate() {
        const btn = document.getElementById('update-btn');
        btn.disabled = true;
        btn.innerHTML = '<span>⏳</span> Bezig met genereren...';
        
        try {
            const res = await fetch('/api/trigger', { method: 'POST' });
            const data = await res.json();
            if (res.ok) {
                showToast('Sync gestart op de achtergrond!');
                checkStatus(); // Start checking
            } else {
                throw new Error(data.error || 'Server error');
            }
        } catch (e) {
            alert('Fout bij starten update: ' + e.message);
            btn.disabled = false;
            btn.innerHTML = '<span>🔄</span> Nu Synchroniseren & Genereren';
        }
    }

    let statusInterval;

    async function checkStatus() {
        try {
            const res = await fetch('/api/status');
            const { isProcessing } = await res.json();
            
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const btn = document.getElementById('update-btn');

            if (isProcessing) {
                dot.className = 'dot processing';
                text.textContent = 'Bezig met genereren (GitHub)...';
                btn.disabled = true;
                btn.innerHTML = '<span>⏳</span> Bezig (kan 2-4 min duren)...';
                
                if (!statusInterval) {
                    statusInterval = setInterval(checkStatus, 3000);
                }
            } else {
                if (statusInterval) {
                    clearInterval(statusInterval);
                    statusInterval = null;
                    initDashboard(); // Refresh stats
                }
                
                btn.disabled = false;
                btn.innerHTML = '<span>🔄</span> Nu Synchroniseren & Genereren';
                
                // Let initDashboard set the final healthy status
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function initDashboard() {
        try {
            // Get Config
            const confRes = await fetch('/api/config');
            if (confRes.ok) {
                const conf = await confRes.json();
                document.getElementById('feed-url').value = conf.feedUrl || '';
            }

            const bust = '?' + new Date().getTime();
            
            const txtRes = await fetch('/last_updated.txt' + bust);
            if (txtRes.ok) {
                const dateStr = await txtRes.text();
                const lastSync = new Date(dateStr.trim());
                
                const formatter = new Intl.DateTimeFormat('nl-NL', {
                    day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                document.getElementById('last-sync').textContent = formatter.format(lastSync);

                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                
                // Only set to active if not currently processing
                fetch('/api/status').then(r => r.json()).then(data => {
                    if (!data.isProcessing) {
                        dot.className = 'dot active';
                        text.textContent = 'Systeem gezond & gereed';
                    }
                });
            } else {
                document.getElementById('last-sync').textContent = 'Nog niet gesynchroniseerd';
                document.getElementById('status-dot').className = 'dot error';
                document.getElementById('status-text').textContent = 'Geen feed gevonden';
            }

            const xmlRes = await fetch('/meta-product-feed.xml' + bust);
            if (xmlRes.ok) {
                const xmlText = await xmlRes.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "application/xml");
                const items = xmlDoc.querySelectorAll('item');
                document.getElementById('vehicle-count').textContent = items.length + ' Voertuigen';
            } else {
                document.getElementById('vehicle-count').textContent = '0 Voertuigen';
            }
            
            checkStatus();

        } catch (e) {
            console.error(e);
            document.getElementById('status-text').textContent = 'Systeem offline';
        }
    }
    
    initDashboard();
</script>
</body>
</html>
